<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porto Seguro — Controle de Validade</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#222;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#777;
  --gold:#f5a800;--gold2:#e8920a;--gold-bg:rgba(245,168,0,.07);--gold-bdr:rgba(245,168,0,.22);
  --ok:#22c55e;--ok-d:#052e16;--ok-b:#166534;
  --warn:#f59e0b;--warn-d:#1c1003;--warn-b:#713f12;
  --urg:#ef4444;--urg-d:#1c0202;--urg-b:#7f1d1d;
  --venc:#a855f7;--venc-d:#1a0630;--venc-b:#581c87;
  --r:10px;
}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* BANNER */
.cfg{background:linear-gradient(135deg,#1a1200,#150e00);border-bottom:2px solid var(--gold);padding:16px 28px;display:flex;gap:14px;flex-wrap:wrap;}
.cfg.hidden{display:none;}
.cfg-ico{font-size:22px;flex-shrink:0;margin-top:2px;}
.cfg-body{flex:1;}
.cfg-body strong{color:var(--gold);font-size:14px;}
.cfg-body p{font-size:12px;color:#bbb;margin-top:3px;line-height:1.5;}
.cfg-steps{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;}
.cfg-step{background:rgba(245,168,0,.05);border:1px solid var(--gold-bdr);border-radius:8px;padding:10px 12px;}
.cfg-step .sn{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.cfg-step p{font-size:11px;color:#bbb;line-height:1.4;}
.cfg-step code{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--gold);background:rgba(245,168,0,.1);padding:1px 5px;border-radius:3px;}
.cfg-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.cfg-row input{font-family:"JetBrains Mono",monospace;flex:1;min-width:220px;background:#111;border:1px solid var(--gold-bdr);border-radius:7px;padding:8px 11px;color:var(--text);font-size:12px;outline:none;}
.cfg-row input:focus{border-color:var(--gold);}
.cfg-row input::placeholder{color:#555;}
.cfg-row button{font-family:"Inter",sans-serif;font-size:13px;font-weight:700;padding:8px 20px;border-radius:7px;border:none;cursor:pointer;background:var(--gold);color:#000;white-space:nowrap;}
.cfg-row button:hover{background:var(--gold2);}

/* TOPBAR */
.topbar{background:var(--s1);border-bottom:1px solid #1f1800;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--gold-bdr);}
.tl{display:flex;align-items:center;gap:16px;}
.logo-img{height:42px;width:auto;object-fit:contain;}
.sep{width:1px;height:32px;background:var(--border);}
.brand h1{font-size:14px;font-weight:700;letter-spacing:-.2px;}
.brand p{font-size:10px;color:var(--muted);font-family:"JetBrains Mono",monospace;margin-top:1px;letter-spacing:.5px;}
.tr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.chip{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:5px 11px;border-radius:6px;white-space:nowrap;}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 11px;border-radius:6px;background:var(--s2);border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.sdot.live{background:var(--ok);animation:pulse 2s infinite;}
.sdot.err{background:var(--urg);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes spin{to{transform:rotate(360deg);}}

/* BUTTONS */
.btn{font-family:"Inter",sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-weight:700;}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--s2);}
.bse{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:12px;padding:5px 10px;border-radius:7px;font-family:"Inter",sans-serif;font-weight:500;cursor:pointer;transition:all .15s;}
.bse:hover{background:var(--s3);color:var(--text);}
.bsd{background:transparent;color:var(--urg);border:1px solid var(--urg-b);font-size:12px;padding:5px 10px;border-radius:7px;font-family:"Inter",sans-serif;font-weight:500;cursor:pointer;transition:all .15s;}
.bsd:hover{background:var(--urg-d);}

main{max-width:1360px;margin:0 auto;padding:24px 28px;}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;}
.card.ok::before{background:var(--ok);}.card.warn::before{background:var(--warn);}
.card.urg::before{background:var(--urg);}.card.venc::before{background:var(--venc);}
.card:hover{transform:translateY(-2px);border-color:var(--gold-bdr);}
.card.active{border-color:var(--gold);background:var(--gold-bg);}
.card-ico{font-size:24px;margin-bottom:10px;display:block;line-height:1;}
.card-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.card-num{font-size:40px;font-weight:700;font-family:"JetBrains Mono",monospace;line-height:1;}
.card.ok .card-num{color:var(--ok);}.card.warn .card-num{color:var(--warn);}
.card.urg .card-num{color:var(--urg);}.card.venc .card-num{color:var(--venc);}
.card-sub{font-size:11px;color:var(--muted);margin-top:5px;}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.cl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.stitle{font-size:14px;font-weight:600;}
.ctag{font-size:11px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.fb{font-family:"Inter",sans-serif;font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--s1);color:var(--muted);cursor:pointer;transition:all .15s;}
.fb:hover:not(.fa){color:var(--text);}
.fb.fa{border-color:var(--gold);background:var(--gold-bg);color:var(--gold);}
.cr{display:flex;gap:8px;align-items:center;}
.search{position:relative;}
.search input{font-family:"Inter",sans-serif;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;color:var(--text);font-size:13px;width:200px;outline:none;transition:border-color .15s;}
.search input:focus{border-color:var(--gold);}
.search input::placeholder{color:var(--muted);}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}

/* TABLE */
.tbl-wrap{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--s2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{border-left:3px solid var(--gold);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--s2);}
td{padding:12px 14px;vertical-align:middle;}
.pnome{font-weight:500;font-size:13px;margin-bottom:2px;}
.pinfo{font-size:11px;color:var(--muted);}
.mono{font-family:"JetBrains Mono",monospace;font-size:12px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap;}
.badge.ok{color:var(--ok);background:var(--ok-d);border-color:var(--ok-b);}
.badge.warn{color:var(--warn);background:var(--warn-d);border-color:var(--warn-b);}
.badge.urg{color:var(--urg);background:var(--urg-d);border-color:var(--urg-b);}
.badge.venc{color:var(--venc);background:var(--venc-d);border-color:var(--venc-b);}
.pb-wrap{display:flex;align-items:center;gap:8px;}
.pb{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;min-width:45px;}
.pb-fill{height:100%;border-radius:2px;}
.pb-lbl{font-family:"JetBrains Mono",monospace;font-size:11px;min-width:42px;text-align:right;}
.act{display:flex;gap:6px;}

/* LOADING / EMPTY */
.loading{text-align:center;padding:56px;color:var(--muted);display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
.empty{text-align:center;padding:56px 24px;color:var(--muted);}
.empty-ico{font-size:40px;margin-bottom:14px;}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.empty p{font-size:13px;}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border);border-top:2px solid var(--gold);border-radius:14px;padding:28px;width:540px;max-width:95vw;max-height:92vh;overflow-y:auto;}
.mhd{font-size:15px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{font-family:"Inter",sans-serif;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.fg input::placeholder,.fg textarea::placeholder{color:var(--muted);}
.fg input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6);}
.fg textarea{resize:vertical;min-height:60px;}
.mft{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);align-items:center;}
.conf-modal{background:var(--s1);border:1px solid var(--border);border-top:2px solid var(--urg);border-radius:14px;padding:24px;width:380px;max-width:95vw;}
.conf-modal h3{font-size:15px;font-weight:700;margin-bottom:8px;}
.conf-modal p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.cft{display:flex;gap:10px;justify-content:flex-end;}
.toast{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--s2);border:1px solid var(--gold-bdr);border-radius:10px;padding:11px 16px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.6);display:flex;align-items:center;gap:8px;transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);max-width:320px;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.footer{text-align:center;padding:20px;color:#333;font-size:11px;font-family:"JetBrains Mono",monospace;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr);}.fgrid{grid-template-columns:1fr;}.cfg-steps{grid-template-columns:1fr;}}
@media(max-width:600px){main{padding:14px 12px;}.topbar{padding:12px;}.logo-img{height:30px;}.cards{gap:10px;}.search input{width:140px;}.cfg{padding:12px;}}
</style>
</head>
<body>

<div class="cfg" id="cfg-banner">
  <div class="cfg-ico">🔧</div>
  <div class="cfg-body">
    <strong>Configure o banco de dados em tempo real (Supabase — gratuito)</strong>
    <p>Faça isso uma vez. Depois mande o link ou o arquivo pra toda a equipe — todos verão os mesmos dados atualizados automaticamente.</p>
    <div class="cfg-steps">
      <div class="cfg-step">
        <div class="sn">Passo 1 — Criar conta</div>
        <p>Acesse <code>supabase.com</code>, clique em <code>Start for free</code> e crie um projeto chamado <code>porto-estoque</code>.</p>
      </div>
      <div class="cfg-step">
        <div class="sn">Passo 2 — Criar tabela</div>
        <p>No projeto, acesse <code>SQL Editor</code> e execute o script do arquivo <code>SETUP.sql</code> que acompanha este sistema.</p>
      </div>
      <div class="cfg-step">
        <div class="sn">Passo 3 — Copiar credenciais</div>
        <p>Vá em <code>Project Settings → API</code>. Copie a <code>Project URL</code> e a <code>anon public key</code> e cole abaixo.</p>
      </div>
    </div>
    <div class="cfg-row">
      <input type="text" id="cfg-url" placeholder="Project URL: https://xxxx.supabase.co">
      <input type="text" id="cfg-key" placeholder="anon key: eyJhbGci..." style="flex:1.5">
      <button onclick="salvarConfig()">Conectar ✓</button>
    </div>
  </div>
</div>

<script>
const CFG_KEY='ps_sb_v1';
function getCfg(){try{return JSON.parse(localStorage.getItem(CFG_KEY))||{};}catch{return{};}}
function saveCfg(u,k){localStorage.setItem(CFG_KEY,JSON.stringify({url:u,key:k}));}

function salvarConfig(){
  const url=document.getElementById('cfg-url').value.trim().replace(/\/$/,'');
  const key=document.getElementById('cfg-key').value.trim();
  if(!url||!url.startsWith('https://')){toast('URL inválida. Deve começar com https://');return;}
  if(!key||key.length<20){toast('Chave inválida. Verifique a anon key.');return;}
  saveCfg(url,key);iniciar(url,key);
}

let SB='',SK='',ws_conn=null,produtos=[],filtro='todos',editId=null,delId=null;

function hdrs(){return{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=representation'};}
async function sbGet(){const r=await fetch(SB+'/rest/v1/produtos?select=*&order=created_at.asc',{headers:hdrs()});if(!r.ok)throw new Error(r.status);return r.json();}
async function sbIns(p){const r=await fetch(SB+'/rest/v1/produtos',{method:'POST',headers:hdrs(),body:JSON.stringify(p)});if(!r.ok)throw new Error(r.status);return r.json();}
async function sbUpd(id,p){const r=await fetch(SB+'/rest/v1/produtos?id=eq.'+id,{method:'PATCH',headers:hdrs(),body:JSON.stringify(p)});if(!r.ok)throw new Error(r.status);return r.json();}
async function sbDel(id){const r=await fetch(SB+'/rest/v1/produtos?id=eq.'+id,{method:'DELETE',headers:hdrs()});if(!r.ok)throw new Error(r.status);}

function conectarRT(){
  if(ws_conn){try{ws_conn.close();}catch(_){}}
  const wsUrl=SB.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+SK+'&vsn=1.0.0';
  const ws=new WebSocket(wsUrl);ws_conn=ws;
  ws.onopen=()=>{ws.send(JSON.stringify({topic:'realtime:public:produtos',event:'phx_join',payload:{},ref:'1'}));setSS('live','Tempo real');};
  ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(['INSERT','UPDATE','DELETE'].includes(m.event))carregarDados();}catch(_){}};
  ws.onclose=()=>{setSS('','Reconectando…');setTimeout(()=>{if(SB)conectarRT();},5000);};
  ws.onerror=()=>setSS('err','Erro WebSocket');
  setInterval(()=>{if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));},25000);
}

function setSS(state,label){document.getElementById('sdot').className='sdot '+state;document.getElementById('slbl').textContent=label;}

async function carregarDados(){
  if(!SB)return;
  document.getElementById('loading').style.display='block';
  document.getElementById('empty').style.display='none';
  document.getElementById('tbody').innerHTML='';
  setSS('','Carregando…');
  try{produtos=await sbGet();setSS('live','Tempo real');}
  catch(e){setSS('err','Erro de conexão');toast('Erro ao carregar dados.');}
  document.getElementById('loading').style.display='none';
  cards();render();
}

function hoje(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dias(iso){const d=new Date(iso);d.setHours(0,0,0,0);return Math.round((d-hoje())/86400000);}
function st(d){if(d<0)return{key:'venc',label:'⛔ Vencido',cor:'var(--venc)'};if(d<=30)return{key:'urg',label:'⚠️ Urgente',cor:'var(--urg)'};if(d<=60)return{key:'warn',label:'🔶 Atenção',cor:'var(--warn)'};return{key:'ok',label:'✅ OK',cor:'var(--ok)'};}
function fmt(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function cards(){
  const c={ok:0,warn:0,urg:0,venc:0};
  produtos.forEach(p=>{if(p.val)c[st(dias(p.val)).key]++;});
  ['ok','warn','urg','venc'].forEach(k=>document.getElementById('n-'+k).textContent=c[k]);
}

function render(){
  const q=document.getElementById('busca').value.toLowerCase().trim();
  const ord={venc:0,urg:1,warn:2,ok:3};
  let lista=produtos.filter(p=>{
    if(!p.val)return false;
    const mf=filtro==='todos'||st(dias(p.val)).key===filtro;
    const mq=!q||(p.nome||'').toLowerCase().includes(q)||(p.local||'').toLowerCase().includes(q)||(p.cat||'').toLowerCase().includes(q)||(p.obs||'').toLowerCase().includes(q);
    return mf&&mq;
  }).sort((a,b)=>{const da=dias(a.val),db=dias(b.val),ka=st(da).key,kb=st(db).key;return ord[ka]!==ord[kb]?ord[ka]-ord[kb]:da-db;});
  document.getElementById('ctag').textContent=`${lista.length} item${lista.length!==1?'s':''}`;
  const tbody=document.getElementById('tbody'),empty=document.getElementById('empty');
  if(!lista.length){
    tbody.innerHTML='';empty.style.display='block';
    document.getElementById('etitle').textContent=(q||filtro!=='todos')?'Nenhum resultado':'Nenhum produto cadastrado';
    document.getElementById('esub').innerHTML=(q||filtro!=='todos')?'Tente outro filtro ou busca.':'Clique em <strong>+ Novo produto</strong> para começar.';
    return;
  }
  empty.style.display='none';
  tbody.innerHTML=lista.map(p=>{
    const d=dias(p.val),s=st(d);
    const pct=d>0?Math.min(100,Math.round(Math.min(d,120)/120*100)):0;
    const dl=d<0?`${Math.abs(d)}d atrás`:`${d}d`;
    return`<tr><td><div class="pnome">${esc(p.nome)}</div>${p.obs?`<div class="pinfo">${esc(p.obs)}</div>`:''}</td><td><span style="font-size:11px;color:var(--muted)">${esc(p.cat||'—')}</span></td><td><span class="mono" style="color:var(--muted)">${esc(p.local)}</span></td><td class="mono">${p.qtd||0}</td><td class="mono">${fmt(p.entrada)}</td><td class="mono">${fmt(p.val)}</td><td><div class="pb-wrap"><div class="pb"><div class="pb-fill" style="width:${pct}%;background:${s.cor}"></div></div><div class="pb-lbl" style="color:${s.cor}">${dl}</div></div></td><td><span class="badge ${s.key}">${s.label}</span></td><td><div class="act"><button class="bse" onclick="abrirE(${p.id})">✏</button><button class="bsd" onclick="pedirD(${p.id})">✕</button></div></td></tr>`;
  }).join('');
}

function setF(f){
  filtro=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('fa',b.dataset.f===f));
  ['ok','warn','urg','venc'].forEach(k=>document.getElementById('card-'+k).classList.toggle('active',k===f));
  render();
}

function limpar(){['f-nome','f-local','f-obs'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-qtd').value='';document.getElementById('f-cat').value='Biscoito / Snack';document.getElementById('f-entrada').value=new Date().toISOString().slice(0,10);document.getElementById('f-val').value='';}

function abrirNovo(){editId=null;document.getElementById('m-ico').textContent='📦';document.getElementById('m-tit').textContent='Novo produto';document.getElementById('btn-ok').textContent='Salvar produto';limpar();document.getElementById('ov-prod').classList.add('open');setTimeout(()=>document.getElementById('f-nome').focus(),100);}

function abrirE(id){const p=produtos.find(x=>x.id===id);if(!p)return;editId=id;document.getElementById('m-ico').textContent='✏️';document.getElementById('m-tit').textContent='Editar produto';document.getElementById('btn-ok').textContent='Atualizar';document.getElementById('f-nome').value=p.nome||'';document.getElementById('f-local').value=p.local||'';document.getElementById('f-qtd').value=p.qtd||'';document.getElementById('f-cat').value=p.cat||'Outros';document.getElementById('f-entrada').value=p.entrada||'';document.getElementById('f-val').value=p.val||'';document.getElementById('f-obs').value=p.obs||'';document.getElementById('ov-prod').classList.add('open');setTimeout(()=>document.getElementById('f-nome').focus(),100);}

function fecharM(){document.getElementById('ov-prod').classList.remove('open');}
function flash(id){const e=document.getElementById(id);e.style.borderColor='var(--urg)';e.focus();setTimeout(()=>e.style.borderColor='',2000);}

async function salvar(){
  const nome=document.getElementById('f-nome').value.trim();
  const local=document.getElementById('f-local').value.trim();
  const qtd=parseInt(document.getElementById('f-qtd').value)||0;
  const cat=document.getElementById('f-cat').value;
  const entrada=document.getElementById('f-entrada').value;
  const val=document.getElementById('f-val').value;
  const obs=document.getElementById('f-obs').value.trim();
  if(!nome){flash('f-nome');toast('Informe o nome!');return;}
  if(!local){flash('f-local');toast('Informe a localização!');return;}
  if(!entrada){flash('f-entrada');toast('Informe a data de entrada!');return;}
  if(!val){flash('f-val');toast('Informe a data de validade!');return;}
  const sl=document.getElementById('slbl-save'),bo=document.getElementById('btn-ok');
  sl.style.display='flex';bo.disabled=true;
  try{
    if(editId){await sbUpd(editId,{nome,local,qtd,cat,entrada,val,obs});toast('✅ Produto atualizado para toda a equipe!');}
    else{await sbIns({nome,local,qtd,cat,entrada,val,obs});toast('✅ Produto cadastrado — apareceu para todos!');}
    fecharM();await carregarDados();
  }catch(e){toast('Erro ao salvar. Verifique a conexão.');}
  sl.style.display='none';bo.disabled=false;
}

function pedirD(id){const p=produtos.find(x=>x.id===id);if(!p)return;delId=id;document.getElementById('del-txt').textContent=`Remover "${p.nome}"? Esta ação não pode ser desfeita.`;document.getElementById('ov-del').classList.add('open');}
function fecharD(){delId=null;document.getElementById('ov-del').classList.remove('open');}
async function confirmarD(){
  if(!delId)return;
  const nome=(produtos.find(p=>p.id===delId)||{}).nome||'Produto';
  try{await sbDel(delId);toast(`🗑 "${nome}" removido.`);fecharD();await carregarDados();}
  catch(e){toast('Erro ao remover.');}
  delId=null;
}

function exportXLSX(){
  if(typeof XLSX==='undefined'){toast('Aguarde…');return;}
  if(!produtos.length){toast('Nenhum produto para exportar.');return;}
  const ord={venc:0,urg:1,warn:2,ok:3};
  const sorted=[...produtos].sort((a,b)=>{const da=dias(a.val),db=dias(b.val),ka=st(da).key,kb=st(db).key;return ord[ka]!==ord[kb]?ord[ka]-ord[kb]:da-db;});
  const hdr=['Produto','Categoria','Localização','Qtd Caixas','Data Entrada','Data Validade','Dias Restantes','Status','Observação'];
  const rows=sorted.map(p=>{const d=p.val?dias(p.val):null;return[p.nome||'',p.cat||'',p.local||'',p.qtd||0,fmt(p.entrada),fmt(p.val),d!==null?d:'',d!==null?st(d).label:'',p.obs||''];});
  const c={ok:0,warn:0,urg:0,venc:0};produtos.forEach(p=>{if(p.val)c[st(dias(p.val)).key]++;});
  const ws=XLSX.utils.aoa_to_sheet([hdr,...rows]);
  ws['!cols']=[34,18,26,12,14,14,14,16,28].map(w=>({wch:w}));
  const wsR=XLSX.utils.aoa_to_sheet([['Porto Seguro — Controle de Validade',''],['Gerado em',new Date().toLocaleDateString('pt-BR')],['',''],['Status','Qtd'],['✅ OK',c.ok],['🔶 Atenção',c.warn],['⚠️ Urgente',c.urg],['⛔ Vencido',c.venc],['',''],['TOTAL',produtos.length]]);
  wsR['!cols']=[{wch:32},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Estoque');XLSX.utils.book_append_sheet(wb,wsR,'Resumo');
  XLSX.writeFile(wb,`porto_seguro_estoque_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast(`⬇ Excel exportado com ${produtos.length} produto${produtos.length!==1?'s':''}!`);
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

function iniciar(url,key){
  SB=url;SK=key;
  document.getElementById('cfg-banner').classList.add('hidden');
  toast('🔗 Conectando ao Supabase…');
  carregarDados();
  conectarRT();
  setInterval(carregarDados,60000);
}

document.getElementById('ov-prod').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharM();});
document.getElementById('ov-del').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharD();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){fecharM();fecharD();}});

(function(){
  const h=hoje();
  const ds=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const ms=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('date-chip').textContent=`${ds[h.getDay()]}, ${h.getDate()} de ${ms[h.getMonth()]} de ${h.getFullYear()}`;
})();

const cfg=getCfg();
if(cfg.url&&cfg.key){document.getElementById('cfg-url').value=cfg.url;document.getElementById('cfg-key').value=cfg.key;iniciar(cfg.url,cfg.key);}
<\/script>
